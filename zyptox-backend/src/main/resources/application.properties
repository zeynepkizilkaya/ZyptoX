spring.application.name=backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ZyptoX}
spring.datasource.username=${DB_USER:ZyptoX_user}
spring.datasource.password=${DB_PASSWORD:ZyptoX_pass}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:mock_api_key}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.timeout=${GEMINI_TIMEOUT:10}

# Server
server.port=8080